<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
    <div class="card">
        <div class="head">
            <input type="text" class="input-text" placeholder="enter the city name">
            <span class="material-symbols-outlined src">search_insights</span>
        </div>
        <div class="main">
            <div class="city-date-section">
                <h2 class="city">Dumka</h2>
                <p class="day">Tuesday, 25feb 2025</p>
            </div>
            <div class="temp-section">
                <div class="description">
                    <span class="material-symbols-outlined sny ">sunny</span>
                    <p class="description text">Sunny</p>
                </div>
                <div class="temp">25°C</div>
            </div>
        </div>
        <div class="footer">
                <div class="wind">
                    <span class="material-symbols-outlined  icon">air</span>
                    <h3 class="speed win">12 KM/H</h3>
                    <p class="level">Wind</p>
                </div>
                <div class="humidity">
                    <span class="material-symbols-outlined icon">water_drop</span>
                    <h3 class="speed hum">65%</h3>
                    <p class="level">Humidity</p>
                </div>
                <div class="visibility">
                    <span class="material-symbols-outlined icon">visibility</span>
                    <h3 class="speed vis">4 KM/H</h3>
                    <p class="level">Visibility</p>
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
