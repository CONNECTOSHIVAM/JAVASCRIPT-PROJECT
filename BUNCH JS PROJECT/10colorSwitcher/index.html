<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Color Switcher App">
    <title>Color Switcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Color Switcher</h1>
    <div class="container">
       <button class="btn random">random</button>
       <input id="colorInput" class="inp" type="text" placeholder="drop here your fav color...">
       <button class="btn apply">Apply</button>
    </div>
    <p class="error-msg" id="errorMsg"></p>
    <div class="color-text" id="colorText">color code: #232323 </div>

    <!-- connect javascript -->
    <script src="script.js"></script>
</body>
</html>
